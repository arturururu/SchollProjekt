<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test-Seite (Platzhalter)</title>
    <style>
        /* CSS für den Button-Stil */
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #007BFF;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            margin: 20px 0;
        }
        .back-button:hover {
            background-color: #0056b3;
        }

        /* CSS für den Test-Text */
        .test-text {
            font-size: 48px;
            text-align: center;
            margin: 50px 0;
            color: #000000; /* Hellgrau, um anzuzeigen, dass es ein Platzhalter ist */
        }
    </style>
</head>
<body>

    <h1>Platzhalter-Seite</h1>
    
    <!-- Button am ANFANG -->
    <a href="index.html" class="back-button">Zurück zur Startseite</a>

    <hr>
    
    <div class="test-text">
        TEST
    </div>
    
    <hr>

    <!-- Button am ENDE -->
    <a href="Roberta.html" class="back-button">Zurück zur Startseite</a>

</body>

</html>
